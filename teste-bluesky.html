<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Bluesky API</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #F7F4F0; color: #1C1C1C; max-width: 640px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 18px; letter-spacing: .05em; }
    button { background: #1C1C1C; color: #fff; border: 0; padding: 12px 20px; font-size: 14px; cursor: pointer; letter-spacing: .1em; text-transform: uppercase; }
    button:disabled { opacity: .4; }
    .box { border: 1px solid #E8E2D9; background: #fff; padding: 16px; margin-top: 16px; font-size: 13px; }
    .ok { color: #15803d; font-weight: 600; }
    .err { color: #dc2626; font-weight: 600; }
    .muted { color: #6B6B6B; }
    pre { white-space: pre-wrap; word-break: break-word; font-size: 11px; background: #F7F4F0; padding: 10px; max-height: 200px; overflow: auto; }
    .post { border-bottom: 1px solid #EDE8E0; padding: 8px 0; }
    .post:last-child { border-bottom: 0; }
  </style>
</head>
<body>
  <h1>TESTE — API BLUESKY</h1>
  <p class="muted">Clique para fazer 1 busca real (<code>searchPosts</code>, termo "brechó", PT) + checar o trending. Mostra o resultado cru.</p>
  <button id="run">Rodar teste</button>

  <div id="out"></div>

  <script>
    const BASE = 'https://public.api.bsky.app/xrpc';
    const out = document.getElementById('out');
    const btn = document.getElementById('run');

    function add(html) {
      const d = document.createElement('div');
      d.className = 'box';
      d.innerHTML = html;
      out.appendChild(d);
    }

    async function testSearch() {
      const url = `${BASE}/app.bsky.feed.searchPosts?q=${encodeURIComponent('brechó')}&limit=5&lang=pt`;
      try {
        const t0 = performance.now();
        const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
        const ms = Math.round(performance.now() - t0);
        if (!r.ok) {
          add(`<span class="err">✗ searchPosts — HTTP ${r.status}</span> <span class="muted">(${ms}ms)</span><br><span class="muted">Bloqueado ou indisponível para esta origem.</span>`);
          return;
        }
        const data = await r.json();
        const posts = data.posts || [];
        let html = `<span class="ok">✓ searchPosts — HTTP ${r.status}</span> <span class="muted">(${ms}ms · ${posts.length} posts)</span>`;
        html += `<div style="margin-top:10px">`;
        for (const p of posts) {
          const txt = (p.record?.text || '').slice(0, 140);
          const handle = p.author?.handle || '?';
          html += `<div class="post"><strong>@${handle}</strong><br>${txt.replace(/</g,'&lt;')}</div>`;
        }
        html += `</div>`;
        html += `<div class="muted" style="margin-top:8px">cursor: ${data.cursor ? 'sim (dá pra paginar ✓)' : 'não'}</div>`;
        add(html);
      } catch (e) {
        add(`<span class="err">✗ searchPosts — falha de rede/CORS</span><br><span class="muted">${e.message}</span>`);
      }
    }

    async function testTrending() {
      const url = `${BASE}/app.bsky.unspecced.getTrendingTopics?limit=8`;
      try {
        const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!r.ok) { add(`<span class="err">✗ trending — HTTP ${r.status}</span>`); return; }
        const data = await r.json();
        const topics = (data.topics || []).map(t => t.topic).join(' · ');
        add(`<span class="ok">✓ trending — HTTP ${r.status}</span><br><span class="muted">${topics || 'vazio'}</span>`);
      } catch (e) {
        add(`<span class="err">✗ trending — falha de rede/CORS</span><br><span class="muted">${e.message}</span>`);
      }
    }

    btn.addEventListener('click', async () => {
      out.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Testando...';
      add(`<span class="muted">Origem: <code>${location.origin || 'file://'}</code></span>`);
      await testSearch();
      await testTrending();
      btn.disabled = false;
      btn.textContent = 'Rodar de novo';
    });
  </script>
</body>
</html>
